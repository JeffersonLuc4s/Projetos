version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: anime-bot-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  bot:
    build: .
    container_name: anime-deals-bot
    restart: always
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - ./data:/app/data  # SQLite database persiste aqui
    environment:
      - REDIS_URL=redis://redis:6379

volumes:
  redis_data:
